name: splatent
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch::pytorch=2.4.0
  - pytorch::torchvision=0.19.0
  - pytorch::torchaudio=2.4.0
  - pytorch::pytorch-cuda=12.4
  - numpy
  - scipy
  - scikit-learn
  - scikit-image
  - matplotlib
  - seaborn
  - opencv
  - imageio
  - ffmpeg
  - tqdm
  - regex
  - ftfy
  - protobuf
  - tensorboard
  - tensorboardX
  - wandb
  - altair
  - streamlit
  - onnx
  - onnxruntime
  - einops
  - torchmetrics
  - lpips
  - peft=0.9.0
  - diffusers=0.25.1
  - huggingface-hub=0.25.1
  - transformers=4.38.0
  - plyfile
  - pytorch-lightning=2.4.0
  - pycocotools
  - timm
  - test-tube
  - future
  - pip:
    - ninja
    - xformers
    - git+https://github.com/openai/CLIP.git --no-deps
    - imageio[ffmpeg]